<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
}

/* PANEL DE INFORMACION */
#panel{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:10px;
display:none;
z-index:10;
}

</style>

</head>

<body>

<!-- PANEL DONDE APARECE LA TRIVIA -->
<div id="panel">

<h2 id="countryTitle"></h2>

<p><b>Trivia:</b></p>
<p id="triviaQuestion"></p>

<button onclick="showAnswer()">
Ver respuesta
</button>

</div>


<a-scene embedded arjs>

<!-- TEXTURAS DE BANDERAS -->
<a-assets>

<img id="mexicoTexture" src="https://upload.wikimedia.org/wikipedia/commons/f/fc/Flag_of_Mexico.svg">
<img id="argentinaTexture" src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Flag_of_Argentina.svg">
<img id="brazilTexture" src="https://upload.wikimedia.org/wikipedia/en/0/05/Flag_of_Brazil.svg">
<img id="uruguayTexture" src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Flag_of_Uruguay.svg">
<img id="colombiaTexture" src="https://upload.wikimedia.org/wikipedia/commons/2/21/Flag_of_Colombia.svg">
<img id="ecuadorTexture" src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Flag_of_Ecuador.svg">
<img id="usaTexture" src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg">
<img id="canadaTexture" src="https://upload.wikimedia.org/wikipedia/commons/c/cf/Flag_of_Canada.svg">

</a-assets>


<!-- ===================== -->
<!-- MARCADOR MEXICO -->
<!-- ===================== -->

 <a-marker type="pattern" url="pattern-mx.patt" id="mexicoMarker"> 
<!-- <a-marker preset="hiro" id="mexicoMarker"></a-marker> -->
<a-plane
src="#mexicoTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>

</a-marker>



<!-- ===================== -->
<!-- MARCADOR USA -->
<!-- ===================== -->

<a-marker type="pattern" url="pattern-us.patt" id="usaMarker">

<a-plane
src="#usaTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>

</a-marker>



<!-- ===================== -->
<!-- MARCADOR CANADA -->
<!-- ===================== -->

<a-marker type="pattern" url="pattern-ca.patt" id="canadaMarker">

<a-plane
src="#canadaTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>

</a-marker>
    
<!-- ===================== -->
<!-- MARCADOR Argentina -->
<!-- ===================== -->

 <a-marker type="pattern" url="pattern-ar.patt" id="argentinaMarker"> 

<a-plane
src="#argentinaTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>

</a-marker>

<!-- ===================== -->
<!-- MARCADOR BRASIL -->
<!-- ===================== -->

 <a-marker type="pattern" url="pattern-br.patt" id="brazilMarker"> 

<a-plane
src="#brazilTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>

</a-marker>

<!-- ===================== -->
<!-- MARCADOR URUGUAY -->
<!-- ===================== -->

 <a-marker type="pattern" url="pattern-ur.patt" id="uruguayMarker"> 

<a-plane
src="#uruguayTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>
</a-marker>

<!-- ===================== -->
<!-- MARCADOR COLOMBIA -->
<!-- ===================== -->

<a-marker type="pattern" url="pattern-col.patt" id="colombiaMarker"> 

<a-plane
src="#colombiaTexture"
position="0 0.5 0"
rotation="-90 0 0"

<!-- ===================== -->
<!-- MARCADOR ECUADOR -->
<!-- ===================== -->

<a-marker type="pattern" url="pattern-ec.patt" id="ecuadorMarker"> 

<a-plane
src="#ecuadorTexture"
position="0 0.5 0"
rotation="-90 0 0"
width="2"
height="1.2"
animation="property: rotation; to: -90 360 0; loop: true; dur: 6000">
</a-plane>

</a-marker>

<a-entity camera></a-entity>

</a-scene>


<!-- VIDEO -->
<div id="videoContainer" style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
z-index:9999;
">

<iframe 
id="videoFrame"
width="560" 
height="315"
src=""
title="YouTube video"
frameborder="0"
allowfullscreen>
</iframe>

</div>


<script>

function showAnswer(){
alert(currentAnswer)
}

let currentAnswer=""

window.addEventListener("load", function(){

const panel = document.getElementById("panel")
const video = document.getElementById("videoContainer")
const videoFrame = document.getElementById("videoFrame")

const title = document.getElementById("countryTitle")
const question = document.getElementById("triviaQuestion")

/* ===================== */
/* MEXICO */
/* ===================== */

const mexico = document.querySelector("#mexicoMarker")

mexico.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="México 🇲🇽"
question.innerHTML="¿En qué años México fue sede del Mundial?"
currentAnswer="1970 y 1986"

videoFrame.src="https://www.youtube.com/embed/2uRuPzTkcJg"  

})

mexico.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})


/* ===================== */
/* USA */
/* ===================== */

const usa = document.querySelector("#usaMarker")

usa.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="Estados Unidos 🇺🇸"
question.innerHTML="¿En qué año Estados Unidos fue sede del Mundial?"

currentAnswer="1994"

videoFrame.src="https://www.youtube.com/embed/gpEH3pZNXok"

})

usa.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})


/* ===================== */
/* CANADA */
/* ===================== */

const canada = document.querySelector("#canadaMarker")

canada.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="Canadá 🇨🇦"
question.innerHTML="¿En qué año Canadá participó por primera vez en un Mundial?"

currentAnswer="1986"

videoFrame.src="https://www.youtube.com/embed/Uu3ow1_fpxY"

})

canada.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})

/* ===================== */
/* Argentina */
/* ===================== */
const argentina = document.querySelector("#argentinaMarker")

argentina.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="Argentina 🇦🇷"
question.innerHTML="¿Cuántos Mundiales ha ganado Argentina?"

currentAnswer="3 (1978, 1986 y 2022)"

videoFrame.src="https://www.youtube.com/embed/mC2VgPD0rTQ"

})

argentina.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})

/* ===================== */
/* Brazil */
/* ===================== */

const brazil = document.querySelector("#brazilMarker")

brazil.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="Brasil 🇧🇷"
question.innerHTML="¿Cuántos Mundiales ha ganado Brasil?"

currentAnswer="5"

videoFrame.src="https://www.youtube.com/embed/oVLERGbfwvA"

})

brazil.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})

/* ===================== */
/* Uruguay */
/* ===================== */
const uruguay = document.querySelector("#uruguayMarker")

uruguay.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="Uruguay 🇺🇾"
question.innerHTML="¿En qué años Uruguay ganó el Mundial?"

currentAnswer="1930 y 1950"

videoFrame.src="https://www.youtube.com/embed/sgcULpc5rVg"

})

uruguay.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})

/* ===================== */
/* Colombia */
/* ===================== */

const colombia = document.querySelector("#colombiaMarker")

colombia.addEventListener("markerFound", function(){
console.log("COLOMBIA DETECTADA")

panel.style.display="block"
video.style.display="block"

title.innerHTML="Colombia 🇨🇴"
question.innerHTML="¿Quién es el máximo goleador histórico de Colombia?"

currentAnswer="Radamel Falcao"

videoFrame.src="https://www.youtube.com/embed/sgcULpc5rVg"

})

colombia.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})

/* ===================== */
/* Ecuador */   
/* ===================== */

const ecuador = document.querySelector("#ecuadorMarker")

ecuador.addEventListener("markerFound", function(){

panel.style.display="block"
video.style.display="block"

title.innerHTML="Ecuador 🇪🇨"
question.innerHTML="¿En qué año Ecuador debutó en un Mundial?"

currentAnswer="2002"

videoFrame.src="https://www.youtube.com/embed/pRNK68T2IVs"

})

ecuador.addEventListener("markerLost", function(){

panel.style.display="none"
video.style.display="none"
videoFrame.src=""

})

})

</script>

</body>
</html>
